front:
  text: 序傷寒捷訣者豫祖宮方則菴公之所著也自古以來傷寒之書何啻充棟而或失則泛或失則雜矣且其間各執所見建詞立論往往不同問津者恆苦之豫祖上自黃帝素問下及仲景河間東垣丹溪諸書無不研究沉潛之久恍然自得蓋素問以足六經分經論治然未嘗不通乎義也仲景立三百九十六法垂一百一十三方可詢而訣也河間以傷寒為熱病經曰熱病者皆傷寒之類是也東垣以內傷寒悉類傷寒而丹溪之書則云傷寒屬內傷寒者十居八九是皆殊途而同歸百慮而一致者也於是釀花為蜜集腋成裘不漏不支作歌成訣斯誠後學之津梁矣獨惜注釋未詳而粗淺者流或第奉行故事未審證之源委立方之分寸是猶吾祖之深憂也豫不自揣因其耳熟更參前賢章疏節解務使分證立方之妙瞭如指掌非敢祖作而孫述亦冀不負吾祖之苦心焉爾按仲景訣未免汗漫初學讀之如涉海問津以三陽三陰編訣捷簡一誦瞭然矣且各加注釋庶各經不混脈絡分明不毋小補於萬一云爾讀注全集更有深心知者鑑之
