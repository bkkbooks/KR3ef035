body:
  text: 總論欲治傷寒先須識症診脈定名處方必應且如太陽有傷榮傷衛之分陽明有在經在腑之病少陽但主乎中故曰膽為清淨至三陰有傳經直中之不常須究脈理而推詳傳經者脈沉數而煩熱直中者脈沉細而清涼當汗而下為結胸痞氣當下而汗為厥竭亡陽腸垢鶩溏須辨協寒協熱瘀熱蓄血可知發黃發狂癃疹斑爛起於濕熱二毒筋惕肉瞤由於汗下兩傷若夫風溫濕溫風濕中濕風溫則喘息多眠濕溫則妄言不食風濕肢體重而額汗流中濕肌膚黃而小便赤溫病發於春時熱病生於夏月陽毒則面赤而狂斑陰毒則唇青而冷厥發汗戰汗身涼者喜水火既濟之功合病並病下利者俱土木互相為克又聞實為譫語虛作鄭聲水氣停蓄者或嘔或噦火邪劫奪者或狂或驚蛔厥狐惑總是蟲症之號剛痙柔痙併為風病之名霍亂乃暑濕相搏寒熱是邪正交爭喘咳者水搏寒而所致吐衄者熱迫血而妄行單伏雙伏此非怪脈乃否極泰來之兆陽易陰易皆為危症犯男交女接之情惡寒喘嗽者發表自愈惡熱喘滿者攻裡必寧咳逆又名厄忒動悸更曰怔忡雙傳者雙經同病百合者百脈一宗懊惱因心中之鬱悶煩躁是內熱之薰蒸臍痛引陰名為臟結厥利能食號曰除中瘛瘲者手足抽搐怫鬱者頭面蒸紅勞食再復緣新瘥之狂禁過經不解與溫瘧之相同蓋傷寒傳變之不一非雜病徑直而可攻豫茲略陳其要學者自宜變通傷寒總訣治法一二日可發表而散三四日宜和解而痊五六日便實方可議下七八日不愈又復再傳日傳二經病名兩感經傳六日應無不痊太陽無汗麻黃為最太陽有汗桂枝為先小柴胡為少陽之要領大柴胡行陽明之祕堅至三陰則難拘定法或可溫而可下宜數變以曲全生意或可方而可員太陽經傷寒惡寒發熱身無汗頭痛腰痛屬太陽此是傷寒邪在表急宜發散最為良按傷寒初起一二日內乃足太陽膀胱經受之其脈起於目內眥睛明穴上腦下項循肩挾脊抵腰行身之後終於足小指至陰穴也其症則頭項痛腰脊強以及周身病是也然太陽為表之表其脈尺寸俱浮而緊者寒傷榮故無汗也急宜發散則汗出而諸症愈矣宜羌活湯及麻黃湯主之若浮而緩者風傷衛故有汗也宜桂枝湯主之若傷寒見風傷風見寒此為風寒兼受榮衛兩傷也宜大青龍湯主之他如發熱煩渴小便不利此為熱入膀胱之本宜五苓散主之麻黃湯中用桂枝杏仁甘草四般見發熱畏寒身體痛須知一服汗淋漓傷寒發表用羌防蘇葉川芎白芷蒼甘草生薑蔥共引冬時無汗用麻黃按羌活防風為足太陽發表藥也佐以蘇葉川芎白芷蒼朮諸味之辛溫則能助陽氣而發表矣和以甘草使以薑蔥俾腠理通而寒邪散至冬月傷寒必須麻黃之辛熱以汗之斷不可少也他如春夏秋謂非時感冒未可輕用太陽經傷風傷風約略似傷寒有汗須知救表先此是風邪傷在衛桂枝斟酌自安全桂枝湯內藥三般芍藥甘草一處攢若是麻黃相合用方名各半治傷寒大青龍湯桂麻黃杏仁石膏甘草藏棗子生薑乘熱服風寒兩解此為良五苓散內用豬苓白朮雲苓澤瀉群肉桂少加為引導功能利水更生津陽明經分在經在腑太陽不解入陽明邪入陽明勢漸深目痛鼻乾人少睡在經在腑卻宜分陽明者陽氣正盛故曰陽明其脈尺寸俱長長而微洪經病也長而沉數腑病也脈有寸關尺三部此止言尺寸者關在其中矣陽明經經病在經發熱尚憎寒目痛難眠鼻孔干症屬太陽猶未罷葛根白虎應居先按傷寒二三日內乃足陽明胃經受之其脈起於鼻承泣穴絡於目循於面行身之前終於足次指屬兌穴也其症則身熱目痛鼻乾不得眠然陽明為表之裡其脈尺寸俱長長而微洪經病也乃太陽症未罷猶有惡寒在也宜解肌湯葛根湯及白虎湯主之長而沉數腑病也乃太陽經症已罷不惡寒專發熱也宜大承氣湯及調胃承氣湯主之若表症未除里症又急者宜大柴胡湯合表裡而兼治之他如病在膈上者可吐宜瓜蒂散主之此重劑也汗下後虛煩懊惱者可吐宜梔子豉湯主之此輕劑也解肌湯內芍甘羌乾葛陳皮桔梗良白芷黃芩姜共棗陽明經病可煎嘗葛根湯內用麻黃二味加入桂枝湯輕可去實因無汗有汗加葛去麻黃白虎湯中用石膏甘草知母本乃抄人參加上生津液熱渴虛煩入米熬陽明經腑病在腑不寒專發熱咽乾作嘔心煩渴發狂譫語大腸堅大小三承湯可啜按不惡寒者邪不在表也咽乾煩渴並作嘔者皆胃熱甚也胃火上衝故心神失守譫語狂言大便堅燥皆里症也急宜下之陶節菴曰傷寒邪熱傳裡須看氣勢淺深用藥若三焦俱傷則痞滿燥實堅全見宜大承氣湯邪在中焦只有燥實堅三症宜調胃承氣湯加甘草和中去枳實者恐傷上焦氤氳之氣也邪在上焦則痞而滿宜小承氣湯去芒硝者恐傷下焦真陰也若表症未除里症又急不得不下者則用大柴胡湯通表裡而緩治之大承氣最緊小承氣次之調胃又次之大柴胡又次之蓋恐硝性急燥不可輕用也大承氣湯用朴硝大黃等分不須饒厚朴倍加並枳實通腸利便有功勞小承氣湯三件藥枳實大黃並厚朴結胸譫語大腸堅每服五錢功易覺大黃厚朴枳實名厚朴三物湯又厚朴大黃兩味治太陽病腹痛而閉調胃承氣有硝黃甘草同加用最良腹滿便堅兼口渴心煩譫語總相當大柴胡湯用大黃半夏枳實共為良更有黃芩與芍藥薑棗同煎利大腸瓜蒂散中赤小豆二味勻平有傳授豆豉一合水同煎膈上停痰須此吐梔子豉湯梔子先更加豆豉水同煎病後虛煩眠不得心中懊惱吐之痊少陽經主中宜和解少陽寒熱往來頻口苦咽乾脅下疼目眩耳聾頭角痛小柴湯是頂門針按傷寒三四日內及足少陽膽經受之其脈起於目鋭眥瞳子髎骨上頭角絡耳循胸脅行身之側終於足四指之竅陰穴也其症則胸脅滿而耳聾往來寒熱然少陽為半表半裡其脈尺寸俱弦弦而數者病在中也宜小柴胡湯和之凡治有三禁不可發汗發汗則譫語不可吐下吐下則悸而驚只宜和之以柴胡湯至病人嘔而不渴加半夏渴而作嘔加薑汁竹茹或渴或不渴或嘔或不嘔在隨症而加減之小柴胡湯祇五般半夏人參共交攢更有黃芩與甘草生薑棗子水同煎三陰經分傳經直中三陽傳罷入三陰轉入陰經勢轉深若是陰經名直中沉寒錮冷卻宜溫所以三陰有傳經直中之不常須究脈理而推詳傳經者脈沉數而煩熱直中者脈沉細而清涼太陰經傳經熱症陽邪傳入太陰經腹滿咽乾手足溫尺寸俱沉時常數桂枝加入大黃平按傷寒四五日內乃足太陰脾經受之其脈起於手足大指之隱白穴上行至腹絡於嗌連舌本行身之前終於大包穴也其症則腹滿或痛咽乾自利然三陽為表三陰為里其脈尺寸俱沉沉而有力傳經熱症也宜桂枝加大黃湯下之沉而無力直中寒症也宜理中四逆湯溫之若本是陽症或重受風寒或過食生冷或誤服涼藥遂變成陰症此為害熱未已寒病復起始病熱症末傳寒中也亦宜理中四逆湯溫之他如傷寒入三陰尚有在經表邪如太陰有桂枝加芍藥湯少陰有麻黃附子細辛湯厥陰有當歸四逆湯之類皆陰經表藥也當歸四逆湯當歸白芍桂枝細辛通草甘草大棗桂枝大黃甘草芍枳實柴胡薑棗著檳榔大腹用水煎太陰實熱須臾卻桂枝加芍減甘草更用生薑及大棗表症未除因誤下太陰腹痛斯安好太陰經直中寒症直中陰經不發熱腹痛惡寒四肢厥唇青面黑是真陰四逆理中真妙訣此太陰直中寒症其脈沉細無力宜溫之四逆湯中姜一兩生附減半去皮尖一兩甘草水煎服厥而下利用之痊理中甘草用乾薑白朮人參是的當若是內中加附子更名附子理中湯少陰經傳熱症陽邪傳入少陰中口燥咽乾譫語同便實繞臍時硬痛腑中燥屎卻宜攻按傷寒五六日內及足少陰腎經受之其脈起於足之湧泉穴上行貫脊循喉嚨絡舌下注心中行身之前終於腧府穴也其症則口燥咽乾便實譫語或繞臍腹痛是腑中燥屎使然與直中全無干涉宜下之如大承氣及調胃承氣湯是也麻黃附子細辛湯發表溫經兩法彰若非表裡相兼治少陰反熱曷能康少陰經直中寒症惡寒無熱厥如冰吐瀉交加腹內疼六脈沉遲陰毒盛身如被杖爪唇青此少陰直中寒症也其脈沉細無力宜溫之如四逆湯理中湯之類是也厥陰經傳經熱症舌卷囊拳消渴甚四肢厥冷乍還溫煩滿便堅多屬熱六一順氣可旋吞按傷寒六七日內乃足厥陰肝經受之其脈起於足大指之大敦穴循陰器抵小腹絡於肝行身前之側終於期門穴也其症則煩滿而囊縮筋急而唇青在男子則囊拳在女子廷孔急痛痛引小腹廷孔者陰之深處也亦宜分傳經直中治之其脈沉實有力當下如六一順氣湯之類是也沉遲無力當溫如回陽救急湯之類是也六一順氣芍藥標柴胡枳實大黃硝黃芩厚朴同甘草可代三黃功更高厥陰經直中寒症口吐涎沫不作渴嘔逆腹疼四肢厥爪唇青黑是真寒回陽救急功尤捷此足厥陰直中寒症也其脈沉遲無力宜溫之回陽救急半甘苓熟附乾薑肉桂參白朮陳皮五味子治寒直中厥陰經夫傷寒三陰有傳經之熱症有直中之寒邪自是兩途豈容混治其可用不可用之理果何哉若能辨其因正其名察其形治法焉有不當者乎結胸結胸五種須分別大小結胸並水結熱實結胸煩躁多寒實結胸渾不熱按傷寒太陽經症表未解而醫遽下之表邪乘虛入里在五六日便堅口渴日晡潮熱上至心下下至小腹硬滿而痛不可按者乃大結胸也宜大陷胸湯主之或心下硬滿按之則痛是必待按然後作痛況止在心下則小腹之不硬痛可知矣熱徵於前故曰小結胸也宜小陷胸湯主之或水飲停胸水結胸也小半夏加茯苓湯主之或熱多煩躁熱實結胸也如大柴胡六一順氣湯皆可選用也或寒多無熱寒實結胸也枳實理中湯主之大陷胸湯大黃硝甘遂同煎力更饒邪在胸中宜陷下體虛胃弱漫輕調小陷胸湯半夏連栝蔞實共水同煎苦能泄熱辛能散利下黃涎即便安小半夏加茯苓湯行水散痞有生薑加桂去夏治悸厥茯苓甘草湯名彰血結胸血結胸中不可按如狂嗽水不欲咽大便黑色小便通犀角地黃湯最善按傷寒經病熱極而蓄血積於胸中硬痛而不可按者為血結胸也宜犀角地黃湯及桃仁承氣湯主之活人云大抵結胸症固當下須看氣之虛實脈之盛衰若脈來浮大者猶帶表邪不可下下之則死下後而復反結者亦死結胸症悉具而煩躁者亦死下後而舌反黑裂者亦死下後而譫言讝語者亦死也痞氣滿而不痛名為痞枳桔頻投是妙方更有瀉心湯可服大黃附子半甘姜按傷寒心下痞硬而痛者為結胸為實硬滿而不痛者為痞氣為虛凡傷寒痞氣輕者通用枳桔湯其行氣下膈也若心下痞按之濡關上浮者大黃黃連瀉心湯主之若心下痞而復惡寒汗出者附子瀉心湯主之若寒多熱少胸滿而不痛脈濡者半夏瀉心湯主之若干嘔有水氣者生薑瀉心湯主之若干嘔下利腹鳴者此非結熱但以胃虛客氣上逆故使硬也甘草瀉心湯主之大抵傷寒之痞與雜症不同傷寒之痞從外之內故宜苦瀉雜症之痞從內之外故宜辛散附子瀉心用三黃寒加熱藥以維揚痞乃熱邪寒藥治惡寒加附始相當半夏瀉心黃連芩乾薑甘草與人參大棗和之治虛痞法在降陽並和陰去人參即甘草瀉心湯加姜即生薑瀉心湯下厥上竭少陰但厥身無汗強發之時血不安或從口鼻或目出下厥上竭實難全按傷寒傳入少陰而身厥者乃榮衛俱虛不當發汗也若強發其汗致血妄行或從口鼻或從目出此名為下厥上竭主不治也亡陽過汗亡陽症不輕三焦上下及周身桂枝加減苓甘附真武湯兼附瀉心亡陽者謂發汗過多而汗不止也然有衛外之陽為周身榮衛之主此陽虛遂有汗漏不止惡寒身痛之症宜桂枝加附子湯主之有膻中之陽為上焦心肺之主此陽虛遂有叉手冒心及奔豚之症宜桂枝甘草湯及茯苓桂枝甘草湯主之有腎中之陽為下焦真元之主此陽虛遂有發熱眩悸瞤振劈地之症宜真武湯主之有胃中之陽為中焦水穀生化之主此陽虛遂有腹脹滿胃不和而成心下痞之症宜生薑瀉心湯主之大抵傷寒亡陽病本不輕救誤者須觀脈症知犯何逆以法治之真武湯中芍藥煨雲苓浙術炙甘隨附子炮來加減用生薑五片總相宜腸垢鶩溏傷寒下利多般數要識陰陽勿差誤三陽利時身必熱三陰但溫無熱俱合病自利葛根湯或用黃芩湯可愈自利不渴屬太陰少陰必渴身虛故外審證兮內憑脈內外並觀斯兩得脈大由來卻是虛脈滑而數有宿食協熱而利臍下熱譫語而利燥屎結少陰心痛口燥煩卻與利之斯要訣按利與痢不同利者瀉也不因攻下而泄瀉也此即傷寒自利之症俗名漏底傷寒是矣凡傷寒自利有因三陽傳陰經而下利者為協熱利協熱利者曰腸垢臍下必熱宜黃芩湯葛根湯主之有因陰寒直中陰經而下利者必協寒利協寒利者曰鶩溏臍下必寒宜理中四逆湯主之原病式曰瀉白為寒青黃紅黑皆熱也大抵陽熱之利與陰寒不同宜細辨而詳治之凡自利不可發汗以下利為邪氣內攻走津液而胃虛也黃芩湯用甘芍並傷寒自利棗和烹此方遂為治痢祖後人加味或更名發黃溫熱在裡不能散蓄積脾中成此患頭面有汗至頸還渴飲水漿曾莫閒茵陳五苓湯最奇滲濕除黃功有贊瘀血之症亦相類大便必黑此其異下焦有熱或加狂桃仁須加入承氣脾胃有濕熱則發黃黃者脾胃之色也此即傷寒瘀熱發黃之症瘀熱即陽黃也經曰陽明病發熱汗出此為熱越則不發黃若但頭汗身無汗小便不利渴飲水漿此為痰熱在裡必發黃宜以茵陳蒿湯主之如初起發者則以茵陳五苓散主之亦有太陽瘀熱在裡發黃者此亦為陽黃宜以麻黃連翹赤小豆湯主之若身如橘色小便不利腹微滿者亦宜茵陳蒿湯主之若身黃髮熱者則熱外出而不內入矣宜以梔子柏皮湯主之亦有寒濕發黃者身熏黃而色暗此為陰黃宜茵陳附子湯主之亦有瘀血發黃者小便利大便黑此蓄血症也宜桃仁承氣湯及犀角地黃湯主之大抵傷寒發黃與雜症不同宜參症治之經曰中濕與發黃不利小便非其治也茵陳蒿湯用大黃濃煎去疸善毆黃梔子柏皮兼可用五苓加上又為良桃仁承氣五般奇甘草硝黃並桂枝血症發黃瘀內結狂言妄語總相宜滲濕湯中蒼白朮陳皮澤瀉豬苓茯厚朴香砂甘草同燈心姜引水煎服犀角地黃芍藥湯血升胃熱火邪干斑黃湯毒皆堪治或益柴苓總伐肝發狂煩躁狂言仍面赤熱潮咽痛號重陽便於陽毒經中治承氣黃連白虎詳陰燥發狂宜附子血瘀承氣地黃湯發狂者謂濕毒在胃併入於心遂使神志不定而發狂也狂之發作少臥不飢妄語笑妄起行登高而歌棄衣而走甚則逾垣上屋此傷寒陽毒發狂之症也經曰邪入於陽則狂又曰重陽則狂是也宜以大承氣湯倍加芒硝急下之有身熱煩躁不得發狂者表裡俱熱宜三黃石膏湯雙解散治之又有乾嘔面赤發斑咽痛下利黃赤壯熱不得汗者宜葶藶苦酒湯治之亦有陰燥發狂者此非狂也為陰極發燥周身之火浮游於外或欲坐井中或欲投泥水中臥或欲向陰涼中坐煩躁不安亦如狂也但手足逆冷脈息沉微遲細雖煩躁不能飲水者也宜附子湯救之不可一例以陽狂治也亦有瘀血發狂者血上逆則喜忘血下蓄則如狂宜桃仁承氣湯及犀角地黃湯主之其或重尉迫汗灼艾燒針令人煩躁臥起不安則謂之火邪驚狂凡是數者各有條例或狂言目反直視為腎絶汗出輒復狂言不能食死症也非藥石所能及矣附子湯附子炮二枚茯苓三兩人參白朮芍藥黃連解毒湯四味黃柏黃芩梔子是退黃清熱更祛煩吐血便紅皆可治發斑身如塗朱眼如火發斑狂叫無人我血熱不散出乘虛三黃青黛湯最妥發斑者謂熱傷血血熱不散裡實表虛發於皮膚而為斑也或渴症誤溫或當汗失汗當下失下或汗下未解或下早熱邪入胃或下遲熱留胃中皆致發斑輕如疹子重如錦紋若色紫黑熱極而胃爛者必死此即傷寒陽毒發斑之症也凡斑疹將發未發之時宜以升麻葛根湯先透其毒如熱甚者再以犀角地黃湯主之如青黛大青知母石膏黃連黃柏黃芩之類以斑盡為度如汗吐下後虛極發斑者宜以人參白虎湯主之亦有溫毒發斑者冬時感寒至春始發也宜以元參升麻湯解之凡斑疹不可發汗發汗則重令開泄更增斑爛亦不可遽下遽下則重損其陰恐斑毒內陷多致不救不可不慎也升麻葛根湯四味攢上芍藥甘草是傷寒發熱與頭痛痘疹初熱為要劑筋惕肉瞤病人肉瞤並筋惕汗出過經真無敵不然邪入大經中狀如瘛瘲癲癇疾發汗動經身振搖宜用茯苓桂枝術動氣在左誤下之忽爾肉瞤最為逆筋惕肉瞤者皆由汗下太過表邪未解血氣虛奪筋肉失養所致不然邪入大經者謂不因發汗而邪熱搏於血脈之中故惕惕而跳動也張仲景特立真武湯以救其誤又腹中上下左右有動氣俱不可汗下否則必筋惕肉瞤其在左邊動氣者俱不可汗下若汗下則筋惕肉瞤其在右邊動氣者尤當以汗下為戒也風溫風溫熱汗脈多浮喘渴癡眠體不收病在二陰無發汗人參敗毒散宜投風溫者謂先傷於風因而傷熱風與熱搏即發風溫也其脈尺寸俱浮其症則身熱自汗頭痛喘息發渴昏睡或體重不仁其病則在少陰厥陰二經宜以人參敗毒散治之凡風溫不可發汗發汗則譫語煩躁目亂無精如此死者醫殺之耳人參敗毒散桔梗甘草川芎茯苓等枳殼前胡獨活羌柴胡十味性涼冷濕溫濕溫譫熱汗流頻腹滿脛寒頭目疼病在太陰無發汗加蒼白朮效如神濕溫者謂傷於濕因而中暑濕與熱搏即發濕溫也其脈寸濡而弱尺小而急其狀胸滿頭目痛發壯熱若妄言身上汗多而脛逆冷其病則在太陰經宜以白虎加蒼朮湯治之凡濕溫不可發汗發汗則使人不能言耳聾不知痛處其身青面色變是名重暍如此死者醫殺之耳風濕風濕浮兮額汗微腫疼發熱毒重衣桂枝附子專能治甘附湯中悉可醫風濕者先傷濕而後傷風也其脈浮虛而澀其症肢體重痛不能轉側額上微汗怯寒而不欲去衣大便難小便利宜以桂枝附子湯及甘草附子湯治之凡風濕不可發汗若發汗則風去濕在非徒無益而反害之中濕中濕身黃熱痛頻腸稀便澀緩而沉五苓除濕專能治甘附湯中悉可寧中濕者風雨襲虛潤澤蒸氣人多為濕所傷也其脈沉而緩其症一身盡痛重著發黃關節煩痛發熱鼻塞時或脹滿大便利小便難宜以五苓散除濕湯及甘草附子湯治之凡中濕不可發汗發汗則病熱而痙者死亦不可下下之則額汗胸滿微喘而噦小便不利經曰治濕之道不利小便非其治也溫病熱病傷寒溫病發於春夏月傷寒熱病臨羌活沖和湯可治防風通聖散能平傷寒即病者謂之傷寒不即病者謂之溫暑及冬時傷寒至春變為溫病至夏變為熱病也其原不殊故一稱為傷寒其類則殊施治不得相混今人或疑麻黃桂枝湯不可用不知傷寒冬寒之時寒邪在表開其腠理非辛溫不能散之此麻黃桂枝等劑所以必用也溫病熱病發於暄熱之時鬱熱自內達外無寒在表故非辛涼寒苦酸之劑不能解此麻黃桂枝所以不可用而後人所處九味羌活湯防風通聖散之類兼治內外者之所以可用也九味羌活湯防風黃芩白芷與川芎蒼朮生地細辛甘煎法還用薑棗蔥防風通聖將軍芍薄荷歸芎草朴硝梔翹芩桔並白朮麻黃荊芥滑石膏陽毒陽毒狂言面赤紅身斑煩躁數弦洪黃連承氣專能治犀角升麻湯可攻陽毒者謂邪氣深重或失汗或失下或誤服熱藥遂變成陽毒其脈弦洪促數其症面目俱赤發斑如錦紋心下結悶煩躁咽痛甚則狂言奔走逾垣上屋宜以升麻葛根湯犀角地黃湯大承氣湯黃連解毒湯詳症治之五日者可治過六七日不可治矣陰毒陰毒唇青厥冷頻腹痛陰燥疾而沉回陽四逆專能治真武和陰悉可平陰毒者謂腎本虛寒或傷冷物或感寒邪或汗下失宜遂變成毒其脈沉細而疾其症爪唇青黑四肢厥冷身如被杖腹中絞痛甚則陰極發燥精神恍惚宜以四逆真武湯詳症治之五日可治過六七日不可治矣發汗太陽發汗用青龍誤服之時腎氣空厥逆身瞤何藥救方名真武可收功發汗者謂發汗過多乃誤服大青龍湯所致仲景曰若脈微弱汗出惡風不可服此服之則厥逆筋惕肉瞤此為逆也此亦少陰過汗亡陽之症故俱用真武湯以救其誤蓋取固腎為義也戰振栗戰動於身栗動心二邪勝負兩般尋振振汗出將全愈鼓頷虛寒四逆平戰者身為之搖也栗者心戰而惕也此傷寒欲解將汗之時邪正相爭故戰振而股栗也然戰栗有屬陽者真氣來復正氣鼓動外爭而勝故身為振搖遂大汗而解也有屬陰者陽微陰勝邪氣內爭而正不勝故心寒足蜷鼓頷厥冷而一身戰搖也宜四逆湯溫之合病太陽合胃脈浮長若是浮弦合少陽膽合胃時弦不短黃芩承氣葛根詳合病者謂二陽經或三陽經同病病之不傳者也凡三陽合病必互相下利如太陽陽明合病下利脈浮長者葛根湯主之如太陽少陽合病下利脈浮弦者黃芩湯主之如少陽陽明合病下利脈弦長者小承氣湯主之若脈長大而弦利不止不食病名曰負負者失也土敗木賊則死也並病太陽原與陽明並復病歸來作一家尚有太陽宜各半太陽症罷大承瘥並病者謂一經先受病又過一經病之傳者也如太陽陽明若並而未盡是謂未過仲景所謂太陽病不罷面赤陽氣怫鬱在表不得越煩躁短氣是也猶當汗之以各半湯若並之已盡是謂傳過仲景所謂太陽病罷潮熱手足汗出大便硬而譫語是也法當下之以大承氣湯是知傳則入腑不傳則不入腑並病傳變有如此譫語譫語證本非一類或因下利或胃實三陽合病或瘀血或是熱入於血室大抵發熱陽脈生反見陰脈斯為逆血室血瘀承氣宜柴胡白虎地黃合譫語者數數更端聲高脈洪而數蓋由胃熱乘心神識昏冒妄言不休經曰實則譫語是也然譫語症非一端有因胃有燥屎而譫語者宜承氣湯治之有因過汗亡陽而譫語者宜柴胡加桂枝湯治之以和榮衛而通津液也有因三陽合病而譫語者宜白虎湯治之有因熱入血室而譫語者宜桃仁承氣湯及犀角地黃湯治之大抵譫語屬實故宜解清熱然亦有陽虛氣脫而譫語者宜用參朮歸耆等劑他如脈短則死脈自和則愈又身微熱脈浮大者生逆冷脈沉或氣上逆而喘滿或氣下奪而自利皆為逆鄭聲鄭聲脈細是虛形一語頻言脈更沉大小便稀手足冷急煎附子理中湯鄭聲者只將一事一語鄭重諄復聲低脈細而沉經曰虛則鄭聲是也其證大便稀小便利手足冷此陽虛氣脫之狀也宜急煎附子理中湯以救之大抵鄭聲屬虛本非實證他如神昏氣促厄逆不止不知人事者死嘔吐胃家有熱難停食胃冷無和納水漿二證皆令人嘔逆嘔家聖藥是生薑若是上行為氣逆胃家由是不安康有物有聲謂之嘔有物無聲謂之吐蓋由表邪傳裡裡氣上逆則為嘔吐水穀不下是也然嘔吐症本不同有因氣逆而嘔者宜小柴胡湯加生薑主之有因水停心下而嘔者宜茯苓甘草湯主之有因胃熱而吐者宜竹葉石膏湯加生薑汁主之有因胃寒而吐者宜理中湯加生薑主之大抵嘔吐清水即為寒症若胃中有熱必是涎液酸水病機云諸嘔吐酸及水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒此可見矣竹葉石膏湯用參麥冬半夏更加臨甘草生薑加粳米虛煩自利熱能清乾嘔陽明胃絡從頭走氣上逆行須便嘔少陽嘔苦小柴胡胸中有熱黃連候小停心下茯苓甘先嘔後渴五苓散汗後虛煩竹葉湯梔子豆豉尤堪啖有物無聲謂之嘔即海藏東垣所謂乾嘔是也然乾嘔症亦不同有因太陽自汗而乾嘔者桂枝湯主之有因水氣在表而乾嘔者小青龍湯主之有因水氣在裡而乾嘔者十棗湯主之有因少陰下利而乾嘔者姜附湯主之有因厥陰吐沫而乾嘔者吳茱萸湯主之大抵乾嘔與嘔吐不同宜分別治之小青龍湯桂麻草半夏細辛芍藥炒乾薑五味可同煎水停心下斯方好十棗湯中用大棗芫花大戟甘遂好乾嘔脅痛宜煎服伏飲停痰醫莫少吳茱萸湯人參棗重用生薑溫胃好陽明寒嘔少陰利厥陰能解痛皆保火邪驚狂火邪劫奪或驚狂迫汗燒針更走陽煩躁不安何藥治柴胡龍骨可煎嘗火邪驚狂者醫家用火熏尉迫汗及燒針灼艾而然也其人亡陽躁臥起不安宜柴胡加龍骨牡蠣湯主之蓋柴胡龍骨牡蠣能除煩斂氣而鎮驚也蛔厥胃冷仍加重汗出因成蛔厥吐長蟲病源本屬厥陰症宜用烏梅與理中蛔厥者病在厥陰也蛔入上膈則痛須臾復止得食則嘔而又煩蛔聞食臭復出也此為臟寒當自吐蛔與烏梅溫臟安蛔亦有胃冷吐蛔者此因發汗所致病在陽明也宜用理中湯加炒川椒五粒檳榔五分吞烏梅丸蓋烏梅丸於辛酸入肝藥中微加苦寒納上逆之陽邪而順之使下也名曰安蛔實是安胃故病主久利見陰陽不相順接而下利之症皆可以此方括之也烏梅丸用細辛桂人參附子椒姜繼黃連黃柏及當歸溫臟安蛔寒厥劑狐惑咽乾聲啞名狐惑狐則食肛下唇瘡上唇有瘡或食臟黃連犀角可煎嘗狐惑者謂傷寒失汗所致食少胃虛蟲齧五臟故唇口生瘡蟲食其臟則上唇生瘡為惑蟲食其肛則下唇生瘡為狐喉咽干聲啞齒燥惡食面目乍赤赤白乍黑舌上白苔唇黑喜眠四肢沉重宜以黃連犀角湯主之剛痙柔痙元來痙病屬膀胱口噤如癇身反張此是傷風感寒濕故分兩痙有柔剛無汗為剛須易識惟有葛根湯第一有汗為柔見端的桂枝葛根湯救急二經皆宜續命湯剛痙去桂用麻黃柔痙去麻當用桂只依此法最為良痙者太陽中風重感寒濕而致也凡太陽過汗濕家發汗産後血虛以及破傷風皆致發痙經曰身熱足寒頭項強急惡寒頭熱面赤背反張口噤脈沉細如發痙狀是也若先受風復感寒無汗惡寒為剛痙先受風復感寒惡風有汗為柔痙古方通用小續命加減治之有汗去麻黃無汗去桂枝然剛痙屬陽每多急滿之症宜大承氣湯下之柔痙屬陰每多厥逆之症宜桂心白朮散附子防風散溫之大抵剛痙易治柔痙難治神而明之存乎其人耳小續命湯防己桂杏仁黃芩芍藥配甘草參芎與麻黃附子防風一同會霍亂嘔吐而利名霍亂四肢逆冷成斯患寒多不渴理中湯熱多而渴五苓散暑月忽然心撮痛兩腳轉筋多冷汗上吐下利並燥煩水浸香藿吞數盞霍亂者謂揮霍亂也外有所感內有所傷陰陽爭膈邪正交爭故上吐下瀉而腹中痛也邪在上焦則吐邪在下焦則瀉邪在中焦則吐瀉交作此濕霍亂症輕易治若上不能吐下不能瀉則邪不能出壅塞正氣關格陰陽此乾霍亂俗名絞腸痧其死甚速切勿與穀食即米湯下咽亦死然霍亂主治亦有不同如熱多口渴而吐利者五苓散主之寒多不渴而吐利者理中湯主之若挾中濕而吐利者藿香正氣散主之若挾中暑而吐利者三物香薷飲主之大抵霍亂有挾外感者有挾內傷者主治最難分別古方通用鹽熬熱童便調飲極為得治近時通用陰陽水最為穩當服之有神工藿香正風用紫蘇大腹陳皮桔梗咀甘草雲苓半夏曲厚朴白芷棗姜投香薷飲內藥四般厚朴相參扁豆攢加上黃連為絶妙和中祛暑頗能安寒熱往來往來寒熱鬥陰陽大小柴胡及桂姜熱結心煩仍喜嘔渴而頭汗用之良寒熱往來者陰陽相勝邪正相爭而作也蓋寒為陰熱為陽里為陰表為陽邪客於半表半里陰出與陽爭陰勝則寒陽出與陰爭陽勝則熱陽不足則先寒陰不足則先熱是以寒熱往來而無定時也然寒熱往來亦有不同有因熱結在裡而寒熱往來者宜大柴胡湯主之有因汗吐下後不嘔而渴但頭微汗而寒熱往來者宜柴胡桂薑湯主之發喘傷寒喘急最宜詳專論陽明及太陽太陽無汗麻黃症陽明潮熱小承湯水停心下喘而咳加減青龍必可當陰症喘時肢逆冷理中四逆用為良夫喘者肺病也經曰肺主氣肺氣逆而上行沖沖而上喝喝而息數張口抬肩搖身滾肚是為喘也凡傷寒發喘有因太陽無汗而喘者此為邪氣在表心腹必濡而不堅當用麻黃湯主之有因水停心下而喘者此為即水為邪宜小青龍湯散之有因陽明潮濕而喘者此為邪氣在裡心腹必脹而為滿法當用小承氣湯下之若陰症喘則必促脈浮而厥宜理中四逆湯溫之大抵諸喘為惡症以邪氣因盛正氣將脫也他如直視譫語及汗出如油喘不休俱不治也咳嗽太陽咳嗽用青龍里水還須十棗攻寒熱柴胡加減治陰邪真武總收功有聲無痰曰咳有痰無聲曰嗽經曰肺主氣形寒飲冷則傷之使氣逆而不散衝擊咽膈今喉中淫淫如癢習習如梗而咳嗽也凡傷寒咳嗽有因太陽水氣在表而咳者宜小青龍湯主之有因太陽水氣在裡而咳者宜十棗湯主之有因少陽寒熱往來而咳者宜小柴胡湯加減治之有因少陰水氣在裡而咳者宜真武湯主之大抵傷寒以嗽為輕不與雜症同須斟酌治之吐血皆因邪熱中三焦當汗醫家失審量熱毒入深成吐血桃仁承氣地黃湯吐血者諸陽受熱其邪在表當汗不汗致使熱毒入腑積瘀於內迫血妄行而吐也宜以桃仁承氣湯主之亦有服桂枝湯而吐血者宜犀角地黃湯主之大抵吐血衄血有陽乘陰者有陰乘陽者陽乘陰者血熱妄行是也陰乘陽者血不歸經是也衄血太陽衄血病將瘳犀角黃芩芍藥搜漱水陽明犀角進當歸四逆少陰授衄血者經絡熱甚迫血妄行出於鼻者為衄其熱在表欲名紅汗是也凡傷寒衄血有因太陽衄血及服桂枝湯後而衄者此皆陽氣盛長病欲解也宜犀角地黃湯及黃芩芍藥湯茜根湯茅花湯加減主之有因少陰發汗而動衄者此症難治亦可用當歸四逆湯主之大抵吐血衄血脈滑小者生脈實大者死脈微者易治若熱甚脈反數急者死也衄而頭汗出或身上有汗不至足者皆難治也凡衄血亡血家不可發汗發汗則陰陽俱虛針經曰奪汗者無血奪血者無汗此之謂也當歸四逆桂枝芍細辛甘草木通合直加大棗治陰厥脈細陽虛由血弱單伏雙伏傷寒脈伏是何緣陽極如陰大汗全更有夾陰沉伏見須投姜附灸關元傷寒一手脈沉曰單伏兩手脈沉曰雙伏不可以陽症見陰為診乃火邪內郁不得發越陽極似陰故脈伏必有大汗而解正如久旱將雨六合陰晦雨後庶物皆蘇之義又有夾陰傷寒先有伏陰在內外復感寒陰盛陽衰四肢厥冷六脈沉伏須投姜附及灸關元脈乃復出也若太溪衝陽皆無脈者必死陰陽易陰陽易即女勞復痛引陰中熱上衝通用燒裩男女易須知豭鼠亦收功男病新瘥女與之交曰陽易女病新瘥男與之交曰陰易細考之即女勞復也有謂男病愈後因交而女病女病愈後因交而男病於理未然古今未嘗見此症也其脈離經其狀體重少氣小腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急古方通用燒裩散取女人裩襠近隱處煎燒灰水調方寸匕日三服女病用男裩亦有用豭鼠湯者皆治女勞復之方也咳逆陽明咳逆熱寒生水飲停痰氣逆行半夏生薑皆可治橘皮柿蒂總堪平咳逆者氣上逆而厄忒也仲景作咳逆即此症也切勿誤作咳咳者嗽也亦勿誤作噦噦者嘔也今從俗作厄逆者是也凡傷寒厄逆有因胃熱而厄者橘皮竹茹湯主之有因胃寒而厄者丁香柿蒂湯主之有因水飲停痰而厄者半夏生薑湯主之大抵厄在中焦穀氣不運其聲短小得食即發厄在下焦真氣不足其聲長大不食亦然若咳逆不止者不可救藥矣橘皮竹茹治嘔咳參甘半夏枇杷麥赤茯再加薑棗煎方由金匱此方闢丁香柿蒂人參姜厄逆因寒中氣戕濟生香蒂僅二味或加橘竹用皆良心動悸心悸三陽證自詳水停苓甘小柴湯冒旋甘桂瞤真武小建中建炙甘方悸者心中築築動怔忡不安也凡傷寒動悸有因太陽水停心下厥而悸者火畏水故悸也經曰先治其水後治其厥宜茯苓甘草湯主之有因太陽發汗過汗冒旋而悸者宜桂枝甘草湯主之有因發汗過多瞤動而悸者宜真武湯主之有因陽明壯熱往來而悸者宜小柴胡湯主之有因少陽發汗譫語而動悸者亦宜小柴胡湯主之有因傷寒三四日心悸而煩者此陽氣虛也宜小建中湯主之有因傷寒脈結代而心動悸者宜炙甘草湯主之小建中湯芍藥多桂姜甘草大棗和更加飴糖和中臟虛勞腹痛效無過炙甘草湯參薑桂麥冬生地火麻仁大棗阿膠加酒服虛勞肺痿效如神兩感傷寒陰陽俱病終難起兩感傷寒慢料理一日太陽與少陽頭痛口乾煩飲水二日陽明合太陰腹滿身熱如焚燬不欲飲食鼻中干讝言妄語終難睡三日少陽合厥陰耳襲囊縮不知人厥逆水漿不入口六日為期是死辰兩感者雙經同病也其症一日太陽與少陰俱病二日陽明與太陰俱病三日少陽與厥陰俱病此陰陽表裡俱病欲汗之則有里症欲下之則有表症經曰其兩感於寒者必死故仲景亦有治法然仲景又曰兩感俱作治有先後如表症急者當先救表里症急者當先救里故易老為制大羌活湯意謂傳經者皆為陽邪一於升陽散熱滋養陰藏則感之淺者尚或可平也大羌活湯即九味己獨知連白朮暨散熱培陰和表裡傷寒兩感差堪慰百合百合一宗皆病形無復經絡最難明欲臥又卻不得臥欲行還復不能行飲食有美有不美雖如強健步難勝如有寒熱復如無口舌小便還赤澀藥才入口即吐利如有神靈來作孽病後虛勞多變成百合地黃湯可啜百合者百脈一宗也其症行住坐臥不安如有鬼神狀此是傷寒病後虛邪所致宜以百合知母湯百合雞子湯百合代赭湯百合地黃湯主之懊憹憹讀惱古字通用傷寒懊惱勝怔忡或實或虛皆胃中結胸下早陽邪陷陽明誤下胃虛空客氣動膈心中燥梔子湯兼大陷胸胃中燥屎宜承氣腹滿頭堅不可攻懊憹者謂鬱悶不舒也凡傷寒懊惱有因短氣煩躁胸中懊惱心下因硬則為結胸者宜大陷胸湯主之有因舌上白苔虛煩不得眠心下懊惱者此邪熱鬱於胸中也宜梔子豉湯吐之有因陽明無汗小便不利心中懊惱者必發黃宜茵陳蒿湯主之有因陽明病下後懊惱而煩胃中有燥屎者此邪熱結於胃中也宜承氣湯攻之奔豚動氣奔豚動氣有奇方左右高低細揣量去朮理中兼用桂不堪汗下應須詳奔豚者腎積也動氣者謂臟氣不調肌膚間築築跳動遂藏所主見於臍之左右上下獨不言當臍者脾為中州以行四臟之津液左右上下皆不可汗下何況中州其敢輕動乎古通用理中湯去朮加桂苓為主以茯苓利水桂泄奔豚故宜加用白朮滯氣故去之臟結臟結無陽舌白苔陰筋急痛引臍來雖然飲食全如故下利頻頻不可回除中厥而下利當不食反能食者號除中此為胃氣無餘候縱有良師莫奏功瘛瘲瘛為引縮瘲為伸熱極風生並在經滌熱祛風猶可望防風通聖散能平筋急而縮為瘛筋緩而伸為瘲伸縮不已為瘛瘲俗謂之搐搦是也此皆熱極生風風主動故瘛瘲宜以防風通聖散治之以滌熱而祛風也怫鬱怫鬱陽蒸聚體膚便堅為實噦為虛二陽並病容顏赤承氣參枝各半舒怫鬱者謂陽氣蒸越形見於頭面體膚之間聚赤而不散也凡傷寒怫鬱有因小便不利時有微熱大便乍難怫鬱而不得臥者此為燥屎囊實也宜承氣湯下之有因吐下後極虛其人怫鬱復與水發汗因而得噦者此胃中虛也宜桂枝人參湯主之有因太陽初得病發汗不徹並歸陽明續自微汗面赤者此陽氣怫鬱也宜各半湯主之勞復食復傷寒瘥後熱還生因食因勞輒動經脈實下之浮即汗大柴鼠糞氣溫平勞復食復者謂傷寒新瘥血氣未平餘熱未盡因勞動而復作者名曰勞復以枳實梔子豉湯及小柴胡湯主之宜和中以退其熱也又有因過餐而復發者名曰食復以梔子大黃湯及大柴胡湯主之通其陽以退其熱也過經不解壞病多緣汗下差過經不解咎醫家柴胡湯內加硝治解表還兼瀉里佳過經不解者謂傷寒十二日當愈不愈則再傳是謂過經此即傷寒壞病多因汗下失宜所致宜柴胡加芒硝湯治之以解表而攻裡也溫瘧溫瘧多因壞病成後寒先熱往來頻小柴加桂專能治白虎人參實可平溫瘧者冬受寒邪復感春寒而發也其脈尺寸俱盛其症先熱後寒或寒熱往來此亦傷寒壞病也宜小柴胡湯少加薄桂主之如熱多倍加柴胡寒多倍加桂枝若熱甚而煩躁者宜人參白虎湯主之大抵傷寒溫瘧不與雜症同宜參證治之渴症大渴飲時能一斗常令止與二三升若還不與非其治強飲無疑別病生脈浮而渴太陽病有汗而渴陽明症渴而自利屬少陰三者不同須審定自非大渴莫與飲小渴惟宜滋潤爾若是劇飲心下滿變成水結難調理漱水不欲咽陽明口渴苦頭痛水不下咽將衄血瘀血停留定發狂病家外症無寒熱按陽明內有熱者欲飲水今漱水不欲咽是熱在經而里無熱也陽明經氣血俱多經中熱盛逼血妄行故知必作衄也宜犀角地黃湯及茅花湯主之無表症不寒熱胸腹滿口燥渴漱水不欲咽小便多者此為瘀血必致發狂宜桃仁承氣湯甚者抵當丸取盡黑色為度也又少陰脈沉細手足冷或時煩躁作渴欲漱水不欲咽者宜四逆湯主之又下利厥逆無脈乾嘔煩渴欲漱水不欲咽宜白虎加豬膽汁人尿主之及唇時不欲咽者宜理中湯加烏梅主之大抵陰症發燥煩渴不能飲水或有勉強飲下良久復吐或飲水而嘔或噦逆皆內寒也蓋無根失守之火遊於咽嗌之間假作燥渴則不能飲或有能飲水不吐復欲飲者熱也背惡寒背上惡寒人少會少陰之病口中和三陽合病口乾燥以此區分免致訛背惡寒者謂身體不惡寒獨在背上也經云背為陽腹為陰背惡寒者陽不足也然有陰陽二證若邪熱陷內消耗津液故口中乾燥全無滋吐宜用人參白虎湯主之又中暑亦有背惡寒症但面垢自汗脈虛而伏亦宜服之若脾胃素虛之人遇暑月飲冰水啖生冷寒氣蓄聚陰上乘陽致寒從背起冷如掌大當以溫藥主之大順散之類是也大順散內用乾薑桂杏還同甘草良中暑卻宜專服此井花調服自安康惡寒惡寒發熱發於陽陰病憎寒身體涼解表桂枝並越婢溫中須索理中湯惡寒一症即前云寒邪外束則惡寒也此復舉以言之分別三陽三陰之不同也若在三陽則必發熱若在三陰則專惡寒而不發熱在三陽則宜解表如羌活湯解肌湯小柴胡湯各隨證用之如中三陰則宜理中湯或四逆湯皆可選用也如桂枝湯越婢湯未可輕用汗後惡寒汗後惡寒宜芍藥脈沉發熱下尤良四肢疼痛仍兼利厥冷須投四逆湯傷寒汗後則寒邪自散不當惡寒然汗後猶惡寒者何也蓋陽微則惡寒須芍藥湯以收斂之倘脈沉屬裡發熱惡寒者恐內有積熱宜下之為良也若四肢疼痛瀉利厥冷此陰症也宜四逆湯溫之陽經發熱太陽發熱惡風寒汗出陽明胃燥干有燥屎而乾枯嘔逆項疼身發熱醫家當作少陽看太陽當汗陽明當下少陽當和解陰經發熱太陰厥陰皆不熱惟有少陰間發熱陽經發熱脈浮大四肢遇暖便閉塞陰經發熱脈必沉下利四肢恆厥逆下後有熱曾經下後身發熱漸覺胸中成痛結香豉梔子卻相宜去病每如湯沃雪頭痛三陽往往病頭痛隨證須知識病因太陽惡寒宜解表羌和湯中倍用芎蒸蒸發熱陽明熱調胃承氣方最真少陽受病脈弦細痛連項角耳中疼或加口苦兼寒熱小柴胡症自分明三陰本沒頭疼痛頭若疼時屬厥陰更有停痰能作祟四肢厥逆痛難禁咽痛咽痛陰陽迥不同咽喉腫痛熱邪攻脈浮散大或吐血隨方用藥自然通陰毒咽痛喉不利寒邪伏在少陰中脈來微弱當溫散半夏桂湯是先鋒須用四逆加桔梗治不可紊自見功脅痛少陽膽經循脅過邪入此經痛無那心下堅滿引脅痛十棗醫治定須可陽明堅滿大便結項強不食並潮熱因而轉入少陽經惟小柴胡湯最功腹滿痛腹中滿痛別陰陽裡實須知下最良脈實有力陽明實大柴小承總一方三陽腹滿而急痛脈沉微細裡寒藏附子理中並四逆對證服藥自然康三陰下利純清穀水瀉洞泄完穀也裡虛已極四神湯腸鳴泄瀉而腹痛虛痛還宜小建良燥咽乾脾為胃行津液熱則枯脾中有熱胃乾枯口燥咽乾津液無宜用白虎加參治少陽口苦小柴胡咽乾慎不可發汗發汗無津氣愈虛少陰火威水欲涸口苦卻宜承氣需循衣摸床傷寒吐下仍不解大便不利寒熱在循衣摸床殊不安獨語猶如見鬼怪微喘直視不識人譫語狂言不可駭大承服後脈強生忽若清兮死難待煩躁傷寒煩躁症如何陽明經與少陰科陽明脈長大便祕傷寒之候太陽多陰盛陽虛亦煩躁少陰之症勿會訛汗之而煩醫者誤病解而煩氣不和更有虛煩宜竹葉依方調治莫蹉跎晝夜偏劇衛氣循環不暫停晝則行陽夜在陰衛獨留陽陽蹺盛陽盛陰虛夜不寧衛若留陰陰蹺滿陰滿陽虛晝卻寧暮譫晝了陰虛症晝燥陽虛夜氣清須要調胃各歸分二氣和諧可漸平多眠多眠思症病形殊風溫狐惑及柴胡更有少陰當慎別須知四者病何如風溫身熱當自汗小柴脅滿項強拘少陰自利但欲寐狐惑多眠非一途不得眠傷寒何事不得眠汗過胃中乾燥煩或因吐下虛煩致或因大熱語言顛小便不利正發渴心煩少氣苦憂煎若其水停心下滿但與豬苓可保痊傷寒瘥後熱還在陰來復時陽使然小便不利胃中干則無小便慎勿利之強使然下焦有熱不通泄量病時須泄與宣咳而有水青龍候項強無汗桂枝痊大抵中遇發黃者先利小便當使快陽明汗多津液無卻以小便利為戒陽若湊之陰分虛小便難出熱邪拘傷風不止桂加附陽明風中小柴胡小便自利太陽下焦有熱祕小腹必滿便不利小便不利反自利此是抵當血症諦陽明自汗小便結忽若利時津液竭屎難堅硬不可攻蜜導用之斯要訣又問小便何故數腎與膀胱虛熱作虛不故令小便頻熱則遲澀相擊搏有汗不可服桂枝趺陽浮澀是脾約胃中不和譫語時調胃承氣宜斟酌大便不利大便堅硬或不通柴胡承氣可收功亦有不可攻擊者歌載篇章里症中寒則溏泄熱則垢可揣陰陽虛實候藏火不及大寒行民病鶩溏腸胃訛陰症陰症身涼二便清病初自汗不頭疼也無煩躁也無渴脈息沉微自可明陽症陽症身熱頭疼痛體痛咽乾難臥動或有譫語及尋衣脈急洪長宜審用表症傷寒表症是如何無汗惡寒身熱多頭項俱疼脈浮取施方審症汗之和里症傷寒里症心腹痛不惡寒而惡熱蒸其脈沉數兼自汗二便祕少下之生陰厥陰厥身涼熱不由二便清滑不煩時脈來沉浮如端的三建湯兼四逆宜陽厥陽厥時時指爪溫心煩便閉口乾論脈來沉細中還疾承氣柴胡最可吞陰症似陽陰症似陽面色紅小便清滑大便通渾身微熱沉遲脈真武湯兼用理中陽症似陰陽症身涼冷四肢小便赤少大便稀心煩口燥脈沉數白虎湯兼竹葉奇婦人傷寒婦人此病當區別身重身輕不同例産前身重且安胎産後血虛先補血惟有柴胡四物湯庶可調和便安悅婦人熱入血室婦人中風六七日身熱續續發寒栗經水適來或適斷熱隨陰血居其室晝則明瞭暮讝語狀如見鬼似瘧疾無犯胃氣及三焦小柴胡湯尤為的更刺期門似瀉肝邪去自然保安吉切須急療莫遲遲變症來時恐莫及傷寒有時氣瘟疫不同春氣溫和夏暑熱秋氣清涼冬凜冽四時正氣自調勻不犯寒邪無病孽冬時嚴寒欲周密君子深藏宜入室中而即病曰傷寒觸冒寒邪成此疾毒氣入深不即病至春與夏邪方出春為溫病夏為暑變態無端病非一若乃時行自不同蓋是非時之氣失春時應暖反大寒夏時應熱偏寒栗秋氣清涼大熱來冬月嚴寒如春日少長一般病相似此是時行歸瘟疫防風通聖扶正氣九味羌和湯檢一傷寒有四症相類食積寒痰並腳氣更兼亦有患勞煩要識四般相類症不與傷寒一例看寒痰者中脘停痰自中胸滿但頭不痛項不強與傷寒異耳宜二陳湯主之食積者謂胃中停食發熱頭痛但身不痛氣口緊盛與傷寒異耳宜平胃散主之腳氣者足受寒濕頭痛身熱肢節痛便祕嘔逆但腳痛或腫滿或枯細與傷寒異耳宜加減小續命湯主之勞煩者氣血俱虛燥煩發熱但身不痛頭不痛不惡寒脈不浮緊與傷寒異耳宜補中益氣湯主之李東垣內傷外感辨曰傷於飲食勞復七情六欲為內傷傷於風寒暑濕為外感內傷發熱時熱時止外感發熱熱甚不休內傷惡寒得暖便解外感惡寒雖厚衣烈火不除內傷惡風不畏甚風反畏隙風外感惡風見風便惡內傷頭痛乍痛乍止外感頭痛連痛不休直待表邪傳裡方罷內傷有濕或不作渴或心火乘肺亦作燥渴外感須一二日外表熱傳裡口方作渴內傷則熱傷氣四肢沉困無力倦怠嗜臥外感則風傷筋寒傷骨一身筋骨疼痛內傷則短氣不足以息外感則喘壅氣盛有餘內傷則手心熱外感則手背熱天氣通於肺鼻者肺之外候外感傷寒則鼻塞傷風則流涕然能飲食口知味腹中和二便如常地氣通於脾口者脾之外候內傷則懶言惡食口不知味小便黃赤大便或祕或泄左人迎脈主裡內傷則氣口大於人迎內傷證屬不足宜溫宜補宜和外感證屬有餘宜汗宜吐宜下若內傷之症誤作外感妄發其表重虛元氣禍如反掌故立補中益氣湯主之又有內傷外感兼病者若內傷重者宜補養為先外感重者宜發散為急惟上焦痰嘔中焦濕熱傷食膈滿者皆不服補中益氣湯明醫雜著云世間發熱症類傷寒者數種治各不同張仲景論傷寒傷風此外感也風寒之邪感於外自表入里故宜發表以解散之此麻黃桂枝之義也以其感於冬時之令寒冷之月即時發病故謂之傷寒而藥用辛熱以勝寒若時非寒冷則藥當有變矣如春溫之月則當變以辛涼之藥夏暑之月則當變以甘寒苦之藥又有一種冬溫之病謂之非其時而有其氣蓋冬寒時也而反病溫焉此天時不正陽氣反泄用藥不可溫熱又有一種時行寒疫卻在溫暖之時當溫暖而寒反為病此亦天時不正陰氣反逆用藥不可寒涼又有一種溫疫熱病多發於春夏之間沿門合境相同者此天地之癘氣當隨時令參氣運而施治宜用劉河間辛涼甘苦寒之藥以清熱解毒以上諸症皆為感天地之邪者若夫飲食勞倦為內傷元氣此則真陽下陷內生虛熱故東垣發補中益氣之論用參耆等甘溫之味大補其氣而提其下陷此用氣藥以補其不足也又若勞心好色內傷真陰陰血既傷故陽氣偏勝而變為火矣是謂陰虛火旺勞瘵之症故丹溪發陽有餘陰不足之論用四物加黃柏知母補其陰而火自降此用血藥以補血之不足也補氣補血皆內傷症也一則因陽氣之下陷以升提之補其氣一則因陰火之上升滋其陰以降下之一升一降迥然不同矣又有夏月傷暑之病雖屬外感卻類傷寒與傷寒大異蓋傷寒則寒邪客表有餘之症故宜汗之暑傷氣元氣為熱所傷而耗散不足之症故宜補之東垣所謂清暑益氣是也又有因時暑熱而多食冷物以傷其內或過取涼風以傷其外此非暑傷人乃因暑而自致之病治宜辛熱解表或辛溫理中之藥卻與傷寒治法相類者也凡此數症外形相似實有不同治法多端不可或謬故必審其果為傷寒及寒疫也則用仲景法果為溫病及瘟疫也則用河間法果為氣虛也則用東垣法果為陰虛也則用丹溪法如是則庶無差誤以害人矣今人但見發熱之症一皆認作傷寒外感率用汗藥以發其表汗後不解又用表藥以涼其肌設是虛症豈不死哉間有頗知發熱屬虛而用補藥則又不知氣血之分或氣病而補血或血病而補氣誤人多矣故外感之與內傷寒病之與熱病氣虛之與血虛如冰炭相反治之若差則輕病必重重病不救矣醫貫曰讀傷寒而不讀東垣書則內傷不明而殺人多矣讀東垣書而不讀丹溪書則陰虛不明而殺人多矣東垣脾胃論深明飢飽勞役發熱等症俱是內傷悉類傷寒切戒汗下以為內傷多而外感少只須溫補不必發散如外感多而內傷少溫補中少加發散以補中益氣湯為主如內傷兼寒者加麻黃兼風者加桂枝兼暑者加黃連兼濕者加羌活此特陽虛發熱之一門也然陰虛發熱者十有六七亦類傷寒今人一見發熱則曰傷寒須用發散而致死則曰傷寒之法已窮余嘗於陰虛發熱者見其大熱面赤口渴燥煩與六味地黃丸一劑即愈如下部惡寒足冷上部渴甚燥極或飲而反吐即如肉桂五味甚則加附子冷飲以此活人多矣此丹溪發明陰虛發熱之外尚遺未盡之旨也
